<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiherramientas.gt</title>
    <style>
        /* Estilos integrados para asegurar el ajuste profesional */
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background-color: #f8f8f8;
            padding: 10px 0;
        }

        /* Ajuste responsivo del Logo */
        .logo {
            max-width: 200px; 
            width: 80%;       
            height: auto;
            margin-bottom: 10px;
        }

        /* Ajuste responsivo del Banner */
        .banner {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover; /* Evita que la imagen se estire o deforme */
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo Multiherramientas" class="logo">
        
        <img src="banner.png" alt="Banner Principal" class="banner">
    </header>

    <main>
        <h1>Bienvenido a Multiherramientas.gt</h1>
        <p>Aquí encontrarás la mejor maquinaria y herramienta.</p>
        </main>

</body>
</html>
