<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiherramientas GT | Equipos Profesionales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --amarillo: #fbc02d; --azul-oscuro: #0d233a; --verde-whatsapp: #25d366; }
        body { font-family: sans-serif; background-color: #f4f6f9; margin: 0; }
        
        /* Encabezado con Logo */
        header { background-color: var(--amarillo); padding: 15px 5%; text-align: center; }
        .logo-web { height: 60px; }
        
        /* Banner Decorativo */
        .hero-banner img { width: 100%; display: block; }
        
        /* Catálogo */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #ddd; }
        .product-card img { max-width: 100%; height: 150px; object-fit: contain; }
        
        /* Modal de Burbuja */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; max-width: 500px; width: 90%; text-align: center; }
        .btn-whatsapp-modal { display: block; background: var(--verde-whatsapp); color: white; padding: 15px; border-radius: 5px; text-decoration: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="Logo Multiherramientas.Gt.png" alt="Logo" class="logo-web">
    </header>

    <div class="hero-banner">
        <img src="Imagen de herramientas.png" alt="Banner Decorativo">
    </div>

    <main class="catalog-container">
        <div class="products-grid" id="productsGrid"></div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <img id="modalImg" src="" style="width:100%; height:200px; object-fit:contain;">
            <ul id="modalSpecsList" style="text-align: left;"></ul>
            <a href="" id="modalWhatsAppBtn" class="btn-whatsapp-modal" target="_blank">Consultar por WhatsApp</a>
            <button onclick="closeModal()" style="margin-top:10px;">Cerrar</button>
        </div>
    </div>

    <script src="productos.js"></script>
    <script>
        const grid = document.getElementById('productsGrid');
        const modal = document.getElementById('productModal');

        function render() {
            listaProductos.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openModal(prod.id);
                card.innerHTML = `<img src="${prod.imagen}"><h3>${prod.nombre}</h3><p>${prod.resumen}</p>`;
                grid.appendChild(card);
            });
        }

        function openModal(id) {
            const prod = listaProductos.find(p => p.id === id);
            document.getElementById('modalTitle').innerText = prod.nombre;
            document.getElementById('modalImg').src = prod.imagen;
            document.getElementById('modalSpecsList').innerHTML = prod.especificaciones.map(s => `<li>${s}</li>`).join('');
            const msg = encodeURIComponent(`Hola, me interesa: ${prod.nombre}`);
            document.getElementById('modalWhatsAppBtn').href = `https://wa.me/50236389133?text=${msg}`;
            modal.classList.add('active');
        }

        function closeModal() { modal.classList.remove('active'); }
        render();
    </script>
</body>
</html>
